<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平台业务流转全流程说明</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }

    /* 容器布局 */
    .container {
      display: flex;
      min-height: 100vh;
    }
    
    h4 + ol {
      text-indent: 2em;
    }
    /* 侧边栏样式 */
    .sidebar {
      width: 260px;
      background-color: #f8f9fa;
      padding: 20px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid #e0e0e0;
      z-index: 1000;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #2c3e50;
      padding-bottom: 10px;
      border-bottom: 2px solid #3498db;
    }

    .sidebar nav ul {
      list-style: none;
      padding: 0;
    }

    .sidebar nav li {
      margin: 8px 0;
    }

    .sidebar nav a {
      color: #555;
      text-decoration: none;
      display: block;
      padding: 10px 15px;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-size: 20px;
    }

    .sidebar nav a:hover {
      background-color: #e8f4fc;
      color: #2980b9;
      padding-left: 20px;
    }

    .sidebar nav a.active {
      background-color: #3498db;
      color: white;
      font-weight: 500;
    }

    /* 主内容区样式 */
    .main-content {
      margin-left: 260px;
      padding: 30px 50px;
      flex: 1;
      width: calc(100% - 260px);
    }

    .main-content h1 {
      font-size: 28px;
      color: #2c3e50;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #3498db;
    }

    .main-content h2 {
      font-size: 22px;
      color: #34495e;
      margin: 30px 0 15px 0;
    }

    .main-content h3 {
      font-size: 18px;
      color: #000000;
      margin: 25px 0 12px 0;
    }

    .main-content p {
      margin: 15px 0;
      text-align: justify;
    }

    .main-content img {
      width: 250px;
      height: 250px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      /* margin: 15px 0; */
    }

    /* 图片放大模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }

    .modal img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      border-radius: 8px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close:hover {
      color: #3498db;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .main-content {
        margin-left: 0;
        width: 100%;
        padding: 20px;
      }

      .main-content img {
        width: 100%;
        height: auto;
      }
    }
    p{
      font-size: 18px;
      font-weight: 400;
    }
    /* 滚动条样式 */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #bdc3c7;
      border-radius: 3px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: #95a5a6;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 侧边栏导航 -->
    <aside class="sidebar">
      <h2>业务全流程导航</h2>
      <nav id="sidebarNav">
        <ul>
          <li><a href="#data-source-config" data-section="data-source-config">数据源配置</a></li>
          <li><a href="#meta-collection" data-section="meta-collection">元数据采集</a></li>
          <li><a href="#data-standard" data-section="data-standard">数据标准管理</a></li>
          <li><a href="#landing-mapping" data-section="landing-mapping">落地映射</a></li>
          <li><a href="#landing-evaluation" data-section="landing-evaluation">落地评估</a></li>
          <li><a href="#data-collection" data-section="data-collection">数据采集</a></li>
          <li><a href="#landing-quality" data-section="landing-quality">落地质检</a></li>
          <li><a href="#data-asset" data-section="data-asset">数据资产化</a></li>
          <li><a href="#data-product" data-section="data-product">数据产品封装</a></li>
          <li><a href="#data-share" data-section="data-share">数据共享</a></li>
          <li><a href="#monitor-feedback" data-section="monitor-feedback">监控与反馈</a></li>
        </ul>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <h1>平台业务流转全流程说明</h1>
      <div id="content"></div>
    </main>
  </div>

  <!-- 图片放大模态框 -->
  <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img id="modalImage" src="" alt="放大图片">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // 加载 Markdown 文件并渲染内容
    fetch('./fullProcessDescription.md')
      .then(response => response.text())
      .then(text => {
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = marked.parse(text);

        // 为 Markdown 中的标题添加对应 ID
        syncHeadingIds();

        // 初始化侧边栏激活状态
        updateActiveSection();

        // 为所有图片绑定点击事件
        initImageModal();

        // 滚动监听 - 高亮当前章节
        window.addEventListener('scroll', updateActiveSection);
      })
      .catch(error => {
        console.error('加载 Markdown 文件失败:', error);
        document.getElementById('content').innerHTML = 
          '<p style="color: red;">加载内容失败，请确保 fullProcessDescription.md 文件存在。</p>';
      });

    // 同步 Markdown 渲染后的标题 ID 与侧边栏链接
    function syncHeadingIds() {
      const idMapping = {
        'data-source-config': '数据源配置',
        'meta-collection': '元数据采集',
        'data-standard': '数据标准管理',
        'landing-mapping': '落地映射',
        'landing-evaluation': '落地评估',
        'data-collection': '数据采集',
        'landing-quality': '落地质检',
        'data-asset': '数据资产化',
        'data-product': '数据产品封装',
        'data-share': '数据共享',
        'monitor-feedback': '监控与反馈'
      };

      const contentDiv = document.getElementById('content');
      const headings = contentDiv.querySelectorAll('h1, h2, h3');

      headings.forEach(heading => {
        const text = heading.textContent.trim();
        for (const [id, title] of Object.entries(idMapping)) {
          if (text.includes(title) && !heading.id) {
            heading.id = id;
            break;
          }
        }
      });
    }

    // 更新侧边栏激活状态
    function updateActiveSection() {
      const sections = document.querySelectorAll('#content h1, #content h2, #content h3');
      const sidebarLinks = document.querySelectorAll('.sidebar nav a');
      
      let current = '';
      const scrollPosition = window.scrollY + 150;

      sections.forEach(section => {
        const rect = section.getBoundingClientRect();
        const sectionTop = rect.top + window.scrollY;
        
        if (sectionTop <= scrollPosition) {
          current = section.id;
        }
      });

      sidebarLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === `#${current}`) {
          link.classList.add('active');
        }
      });
    }

    // 初始化图片模态框功能
    function initImageModal() {
      const images = document.querySelectorAll('#content img');
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImage');
      const closeBtn = document.querySelector('.close');

      images.forEach(img => {
        img.style.cursor = 'pointer';
        img.addEventListener('click', () => {
          modalImg.src = img.src;
          modal.style.display = 'flex';
          document.body.style.overflow = 'hidden'; // 禁止背景滚动
        });
      });

      // 关闭模态框函数
      const closeModal = () => {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto'; // 恢复背景滚动
      };

      closeBtn.addEventListener('click', closeModal);

      modalImg.addEventListener('click', closeModal);

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });

      // ESC 键关闭模态框
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
          closeModal();
        }
      });
    }

    // 侧边栏链接点击平滑滚动
    document.querySelectorAll('.sidebar nav a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('href').substring(1);
        const targetElement = document.getElementById(targetId);
        
        if (targetElement) {
          const offset = 100;
          const elementPosition = targetElement.getBoundingClientRect().top + window.scrollY;
          window.scrollTo({
            top: elementPosition - offset,
            behavior: 'smooth'
          });

          // 更新激活状态
          document.querySelectorAll('.sidebar nav a').forEach(l => l.classList.remove('active'));
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
